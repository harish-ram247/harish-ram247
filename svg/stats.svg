<svg width="800" height="130" viewBox="0 0 800 130" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    @keyframes pulse      { 0%,100%{opacity:.2}  50%{opacity:.75} }
    @keyframes pulse-fast { 0%,100%{opacity:.15} 50%{opacity:.9}  }
    @keyframes float      { 0%,100%{transform:translateY(0px)} 50%{transform:translateY(-6px)} }
    @keyframes float-sm   { 0%,100%{transform:translateY(0px)} 50%{transform:translateY(-3px)} }
    @keyframes blink      { 0%,49%{opacity:1} 50%,100%{opacity:0} }
    @keyframes flow       { 0%{stroke-dashoffset:24} 100%{stroke-dashoffset:0} }
    @keyframes spin-slow  { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    @keyframes shimmer    { 0%,100%{opacity:.5} 50%{opacity:1} }
    .pulse      { animation: pulse 3s ease-in-out infinite; }
    .pulse-fast { animation: pulse-fast 1.8s ease-in-out infinite; }
    .float      { animation: float 4s ease-in-out infinite; }
    .float-sm   { animation: float-sm 3s ease-in-out infinite; }
    .blink      { animation: blink 1s step-end infinite; }
    .flow       { animation: flow 2s linear infinite; stroke-dasharray:8 5; }
    .shimmer    { animation: shimmer 3s ease-in-out infinite; }
    .d1 { animation-delay: 0s; }
    .d2 { animation-delay: .4s; }
    .d3 { animation-delay: .8s; }
    .d4 { animation-delay: 1.2s; }
    .d5 { animation-delay: 1.6s; }
    .d6 { animation-delay: 2.0s; }
  </style>
  
  <pattern id="stats-dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
  <circle cx="11" cy="11" r="0.65" fill="#1a2235" opacity="0.8"/>
</pattern>
  <filter id="glow-cyan" x="-40%" y="-40%" width="180%" height="180%">
  <feFlood result="colored" flood-color="#58d6ff" flood-opacity="1"/><feComposite in="colored" in2="SourceGraphic" operator="in" result="coloredSource"/><feGaussianBlur in="coloredSource" stdDeviation="5" result="blur"/>
  <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
</defs>

  <rect width="800" height="130" fill="#0a0e17" rx="0"/>
  <rect width="800" height="130" fill="url(#stats-dots)" opacity="0.5"/>
  <text x="400" y="14" font-family="'SF Mono', 'Fira Code', 'Fira Mono', 'Cascadia Code', 'Courier New', monospace" font-size="9" font-weight="normal" fill="#484f58" text-anchor="middle" letter-spacing="3">AT A GLANCE</text>
  <g>
    <rect x="30" y="20" width="238" height="90" rx="10" fill="#0d1320" stroke="#1c2333" stroke-width="0.8"/>
    <!-- Top accent line -->
    <line x1="50" y1="20" x2="248" y2="20" stroke="#58d6ff" stroke-width="1.5" opacity="0.7"/>
    <text x="52" y="60" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="22" font-weight="700" fill="#58d6ff" text-anchor="start">3</text>
    <text x="52" y="82" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="11.5" font-weight="normal" fill="#8b949e" text-anchor="start">Major projects shipped</text>
  </g>
<g>
    <rect x="291" y="20" width="238" height="90" rx="10" fill="#0d1320" stroke="#1c2333" stroke-width="0.8"/>
    <!-- Top accent line -->
    <line x1="311" y1="20" x2="509" y2="20" stroke="#8b949e" stroke-width="1.5" opacity="0.7"/>
    <text x="313" y="60" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="22" font-weight="700" fill="#8b949e" text-anchor="start">2x</text>
    <text x="313" y="82" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="11.5" font-weight="normal" fill="#8b949e" text-anchor="start">Industry Internships</text>
  </g>
<g>
    <rect x="552" y="20" width="238" height="90" rx="10" fill="#0d1320" stroke="#1c2333" stroke-width="0.8"/>
    <!-- Top accent line -->
    <line x1="572" y1="20" x2="770" y2="20" stroke="#e3b341" stroke-width="1.5" opacity="0.7"/>
    <text x="574" y="60" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="22" font-weight="700" fill="#e3b341" text-anchor="start">🏆</text>
    <text x="574" y="82" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="11.5" font-weight="normal" fill="#8b949e" text-anchor="start">IEEE Hackathon, IIM Indore</text>
  </g>
</svg>