<svg width="800" height="190" viewBox="0 0 800 190" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    @keyframes pulse      { 0%,100%{opacity:.2}  50%{opacity:.75} }
    @keyframes pulse-fast { 0%,100%{opacity:.15} 50%{opacity:.9}  }
    @keyframes float      { 0%,100%{transform:translateY(0px)} 50%{transform:translateY(-6px)} }
    @keyframes float-sm   { 0%,100%{transform:translateY(0px)} 50%{transform:translateY(-3px)} }
    @keyframes blink      { 0%,49%{opacity:1} 50%,100%{opacity:0} }
    @keyframes flow       { 0%{stroke-dashoffset:24} 100%{stroke-dashoffset:0} }
    @keyframes spin-slow  { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    @keyframes shimmer    { 0%,100%{opacity:.5} 50%{opacity:1} }
    .pulse      { animation: pulse 3s ease-in-out infinite; }
    .pulse-fast { animation: pulse-fast 1.8s ease-in-out infinite; }
    .float      { animation: float 4s ease-in-out infinite; }
    .float-sm   { animation: float-sm 3s ease-in-out infinite; }
    .blink      { animation: blink 1s step-end infinite; }
    .flow       { animation: flow 2s linear infinite; stroke-dasharray:8 5; }
    .shimmer    { animation: shimmer 3s ease-in-out infinite; }
    .d1 { animation-delay: 0s; }
    .d2 { animation-delay: .4s; }
    .d3 { animation-delay: .8s; }
    .d4 { animation-delay: 1.2s; }
    .d5 { animation-delay: 1.6s; }
    .d6 { animation-delay: 2.0s; }
  </style>
  
  <filter id="pg-glow" x="-40%" y="-40%" width="180%" height="180%">
  <feFlood result="colored" flood-color="#58d6ff" flood-opacity="1"/><feComposite in="colored" in2="SourceGraphic" operator="in" result="coloredSource"/><feGaussianBlur in="coloredSource" stdDeviation="4" result="blur"/>
  <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
  <pattern id="pg-dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
  <circle cx="12" cy="12" r="0.7" fill="#141c2e" opacity="0.8"/>
</pattern>
  <linearGradient id="pg-top" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#58d6ff" stop-opacity="0.08"/><stop offset="100%" stop-color="#58d6ff" stop-opacity="0"/></linearGradient>
</defs>

  <rect x="0" y="0" width="800" height="190" rx="12" fill="#0d1320"/>
  <rect x="0" y="0" width="800" height="190" fill="url(#pg-top)" rx="12"/>
  <rect x="0" y="0" width="800" height="190" fill="url(#pg-dots)" rx="12" opacity="0.4"/>
  <rect x="0.5" y="0.5" width="799" height="189" rx="12" fill="none" stroke="#1c2333" stroke-width="0.8"/>
  <rect x="0" y="16" width="2.5" height="158" rx="1.25" fill="#58d6ff" opacity="0.8"/>
  <g>
    <rect x="640" y="20" width="140" height="22" rx="11" fill="#071c2e" stroke="#1a3a52" stroke-width="0.8"/>
    <text x="710" y="35" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="10.5" font-weight="normal" fill="#58d6ff" text-anchor="middle">IoT · Monitoring</text>
  </g>
  <text x="32" y="56" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="20" font-weight="700" fill="#e6edf3" text-anchor="start">PowerSense</text>
  <text font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="12.5" font-weight="normal" fill="#8b949e" text-anchor="start"><tspan x="32" y="82">Industrial IoT energy monitoring dashboard with real-time</tspan><tspan x="32" dy="19">sensor pipelines and Grafana visualizations.</tspan></text>
