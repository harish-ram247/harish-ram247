<svg width="258" height="300" viewBox="0 0 258 300" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#041a0f"/>
    <stop offset="100%" stop-color="#061e12"/>
  </linearGradient>
  <linearGradient id="border-top" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#3fb950" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#3fb950" stop-opacity="0.2"/>
  </linearGradient>
  <linearGradient id="bar-bg" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#051a0a"/>
    <stop offset="100%" stop-color="#041208"/>
  </linearGradient>
  <linearGradient id="bar-fill" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#3fb950"/>
    <stop offset="100%" stop-color="#56d364"/>
  </linearGradient>
  <filter id="glow">
    <feGaussianBlur stdDeviation="3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <style>
    @keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:1} }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
    @keyframes shimmer-bar { 0%{opacity:.7} 50%{opacity:1} 100%{opacity:.7} }
    .icon{animation:float 4.2s ease-in-out infinite .6s}
    .dot{animation:pulse 2.4s ease-in-out infinite}
    .bar{animation:shimmer-bar 3s ease-in-out infinite 1s}
  </style>
</defs>

<rect width="258" height="300" fill="url(#bg)" rx="12"/>
<rect x="0.5" y="0.5" width="257" height="299" fill="none" stroke="#1a3a20" stroke-width="1" rx="12"/>
<line x1="1" y1="1" x2="257" y2="1" stroke="url(#border-top)" stroke-width="2"/>
<line x1="1" y1="1" x2="1" y2="60" stroke="#3fb950" stroke-width="1" opacity="0.4"/>

<!-- Header badge -->
<rect x="16" y="18" width="90" height="20" rx="10" fill="#041a0f" stroke="#3fb950" stroke-width="0.7"/>
<text x="61" y="32" font-family="'Courier New',Courier,monospace" font-size="9" fill="#3fb950" text-anchor="middle" letter-spacing="0.5">PORTFOLIO v3</text>

<!-- WIP badge -->
<rect x="164" y="18" width="76" height="20" rx="10" fill="#1a0e04" stroke="#e3b341" stroke-width="0.7"/>
<text x="202" y="32" font-family="'Courier New',Courier,monospace" font-size="9" fill="#e3b341" text-anchor="middle">in progress</text>

<!-- Icon area -->
<g class="icon" transform="translate(104, 52)">
  <!-- Browser/terminal icon -->
  <rect x="0" y="0" width="50" height="50" rx="10" fill="#041a0f" stroke="#3fb950" stroke-width="0.8"/>
  <!-- Browser chrome -->
  <rect x="5" y="8" width="40" height="30" rx="3" fill="none" stroke="#3fb950" stroke-width="0.8" opacity="0.7"/>
  <!-- Dots -->
  <circle cx="12" cy="15" r="2" fill="#e05050" opacity="0.8"/>
  <circle cx="20" cy="15" r="2" fill="#e3b341" opacity="0.8"/>
  <circle class="dot" cx="28" cy="15" r="2" fill="#3fb950" filter="url(#glow)"/>
  <!-- Content lines -->
  <line x1="9" y1="22" x2="41" y2="22" stroke="#3fb950" stroke-width="0.5" opacity="0.4"/>
  <rect x="9" y="26" width="20" height="4" rx="2" fill="#3fb950" opacity="0.4"/>
  <rect x="9" y="32" width="32" height="3" rx="1.5" fill="#3fb950" opacity="0.25"/>
</g>

<text x="129" y="122" font-family="'Segoe UI',Arial,sans-serif" font-size="17" font-weight="700" fill="#e6edf3" text-anchor="middle">Portfolio</text>

<line x1="20" y1="134" x2="238" y2="134" stroke="#1a3a20" stroke-width="0.5"/>

<text x="20" y="154" font-family="'Courier New',Courier,monospace" font-size="10" fill="#8b949e">Developer portfolio with project</text>
<text x="20" y="168" font-family="'Courier New',Courier,monospace" font-size="10" fill="#8b949e">showcases &amp; writing.</text>

<!-- Stack tags -->
<g transform="translate(20, 182)">
  <rect x="0" y="0" width="42" height="16" rx="8" fill="#041a0f" stroke="#3fb950" stroke-width="0.5"/>
  <text x="21" y="11.5" font-family="'Courier New',Courier,monospace" font-size="8" fill="#3fb950" text-anchor="middle">React</text>
  <rect x="48" y="0" width="52" height="16" rx="8" fill="#041420" stroke="#00e5ff" stroke-width="0.5"/>
  <text x="74" y="11.5" font-family="'Courier New',Courier,monospace" font-size="8" fill="#00e5ff" text-anchor="middle">Tailwind</text>
  <rect x="106" y="0" width="36" height="16" rx="8" fill="#041a0f" stroke="#3fb950" stroke-width="0.5"/>
  <text x="124" y="11.5" font-family="'Courier New',Courier,monospace" font-size="8" fill="#3fb950" text-anchor="middle">Vite</text>
</g>

<text x="20" y="218" font-family="'Courier New',Courier,monospace" font-size="9" fill="#3a6ea8">role</text>
<text x="48" y="218" font-family="'Courier New',Courier,monospace" font-size="9" fill="#8b949e">Design + Full Stack Dev</text>

<text x="20" y="238" font-family="'Courier New',Courier,monospace" font-size="9" fill="#3a6ea8">status</text>
<rect x="58" y="228" width="162" height="7" rx="3.5" fill="url(#bar-bg)"/>
<rect class="bar" x="58" y="228" width="65" height="7" rx="3.5" fill="url(#bar-fill)" opacity="0.9"/>
<text x="238" y="237" font-family="'Courier New',Courier,monospace" font-size="9" fill="#3fb950" text-anchor="end">40%</text>

<line x1="20" y1="252" x2="238" y2="252" stroke="#1a3a20" stroke-width="0.5"/>

<rect x="20" y="262" width="98" height="26" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="0.8"/>
<text x="69" y="279" font-family="'Courier New',Courier,monospace" font-size="10" fill="#c9d1d9" text-anchor="middle">&#x25CB; GitHub</text>

<rect x="128" y="262" width="110" height="26" rx="6" fill="#041a0f" stroke="#3fb950" stroke-width="0.8"/>
<text x="183" y="279" font-family="'Courier New',Courier,monospace" font-size="10" fill="#3fb950" text-anchor="middle">&#x25B6; Live Demo</text>
</svg>
