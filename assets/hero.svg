<svg width="800" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#060c18"/>
    <stop offset="60%" stop-color="#08101f"/>
    <stop offset="100%" stop-color="#0c1830"/>
  </linearGradient>
  <linearGradient id="border-line" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#00e5ff" stop-opacity="0"/>
    <stop offset="30%" stop-color="#00e5ff" stop-opacity="0.9"/>
    <stop offset="70%" stop-color="#7b2fff" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#7b2fff" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="name-grad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#e6edf3"/>
    <stop offset="100%" stop-color="#b0cce6"/>
  </linearGradient>
  <radialGradient id="logo-glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.2"/>
    <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
  </radialGradient>
  <filter id="glow">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow-strong">
    <feGaussianBlur stdDeviation="7" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
    <circle cx="14" cy="14" r="0.7" fill="#1a2540" opacity="0.9"/>
  </pattern>
  <style>
    @keyframes pulse { 0%,100%{opacity:.25} 50%{opacity:.85} }
    @keyframes pulse2 { 0%,100%{opacity:.15} 50%{opacity:.6} }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
    @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
    @keyframes scan { 0%{transform:translateY(-60px);opacity:0} 8%{opacity:.12} 92%{opacity:.12} 100%{transform:translateY(360px);opacity:0} }
    @keyframes spin-slow { from{transform:rotate(0deg);transform-origin:90px 90px} to{transform:rotate(360deg);transform-origin:90px 90px} }
    @keyframes glow-badge { 0%,100%{box-shadow:0 0 4px #00e5ff} 50%{box-shadow:0 0 12px #00e5ff} }
    .ring1{animation:pulse 3s ease-in-out infinite}
    .ring2{animation:pulse 3s ease-in-out infinite .8s}
    .ring3{animation:spin-slow 12s linear infinite}
    .logo{animation:float 4s ease-in-out infinite}
    .d1{animation:pulse 2s infinite}
    .d2{animation:pulse 2.6s infinite .4s}
    .d3{animation:pulse 3.2s infinite .9s}
    .d4{animation:pulse 2.3s infinite 1.4s}
    .d5{animation:pulse 2.8s infinite .6s}
    .cursor{animation:blink 1s step-end infinite}
    .scanline{animation:scan 8s linear infinite}
    .badge{animation:pulse2 4s ease-in-out infinite}
  </style>
</defs>

<rect width="800" height="300" fill="url(#bg)" rx="14"/>
<rect width="800" height="300" fill="url(#dots)" rx="14" opacity="0.7"/>

<!-- Scanline -->
<rect class="scanline" x="0" y="0" width="800" height="50" fill="url(#border-line)" opacity="0.6" rx="2"/>

<!-- Frame borders -->
<rect x="0.5" y="0.5" width="799" height="299" fill="none" stroke="#1e3a5f" stroke-width="1" rx="14"/>
<line x1="1" y1="1" x2="799" y2="1" stroke="url(#border-line)" stroke-width="2.5"/>

<!-- Corner brackets -->
<polyline points="0,28 0,2 28,2" fill="none" stroke="#00e5ff" stroke-width="1.5" opacity="0.7"/>
<polyline points="772,2 798,2 798,28" fill="none" stroke="#7b2fff" stroke-width="1.5" opacity="0.7"/>
<polyline points="2,272 2,298 28,298" fill="none" stroke="#7b2fff" stroke-width="1.5" opacity="0.7"/>
<polyline points="772,298 798,298 798,272" fill="none" stroke="#00e5ff" stroke-width="1.5" opacity="0.7"/>

<!-- Left: HR Monogram panel -->
<g class="logo" transform="translate(38,52)">
  <!-- Glow halo -->
  <circle cx="90" cy="90" r="85" fill="url(#logo-glow)"/>
  <!-- Outer dashed ring -->
  <circle class="ring1" cx="90" cy="90" r="80" fill="none" stroke="#00e5ff" stroke-width="0.6" stroke-dasharray="5 10" opacity="0.5"/>
  <!-- Mid ring -->
  <circle class="ring2" cx="90" cy="90" r="68" fill="none" stroke="#7b2fff" stroke-width="0.5" stroke-dasharray="3 8" opacity="0.4"/>
  <!-- Spinning accent ring -->
  <circle class="ring3" cx="90" cy="90" r="58" fill="none" stroke="#00e5ff" stroke-width="0.4" stroke-dasharray="1 14" opacity="0.6"/>
  <!-- Solid inner circle -->
  <circle cx="90" cy="90" r="50" fill="#030b18" opacity="0.95"/>
  <circle cx="90" cy="90" r="50" fill="none" stroke="#00e5ff" stroke-width="0.8" opacity="0.5"/>
  <!-- HR letters -->
  <text x="90" y="108" font-family="'Courier New',Courier,monospace" font-size="48" font-weight="900" fill="#00e5ff" text-anchor="middle" filter="url(#glow-strong)">HR</text>
  <!-- Dot accent -->
  <circle cx="90" cy="144" r="2.5" fill="#00e5ff" opacity="0.5" class="d1"/>
</g>

<!-- Right: Content -->
<g transform="translate(228,0)">
  <!-- Label -->
  <text x="2" y="46" font-family="'Courier New',Courier,monospace" font-size="9.5" fill="#3a6ea8" letter-spacing="3.5">DEVELOPER  ·  ENGINEER  ·  BUILDER</text>

  <!-- Name -->
  <text x="0" y="90" font-family="'Segoe UI',Arial,sans-serif" font-size="40" font-weight="700" fill="url(#name-grad)" letter-spacing="-0.5">Harish Ram S</text>

  <!-- Role -->
  <text x="2" y="116" font-family="'Courier New',Courier,monospace" font-size="13" fill="#00e5ff" letter-spacing="0.3">Pre-final Year CS Engineer  ·  CIT, Chennai</text>

  <!-- Divider -->
  <line x1="0" y1="132" x2="540" y2="132" stroke="#1e3a5f" stroke-width="0.6"/>

  <!-- Tagline -->
  <text x="1" y="155" font-family="'Courier New',Courier,monospace" font-size="12.5" fill="#8b949e">Building AI-powered systems that solve real-world problems.</text>

  <!-- Tags row -->
  <g transform="translate(0,172)">
    <rect x="0" y="0" width="76" height="22" rx="11" fill="#041420" stroke="#00e5ff" stroke-width="0.8"/>
    <text x="38" y="15" font-family="'Courier New',Courier,monospace" font-size="10" fill="#00e5ff" text-anchor="middle">AI + ML</text>

    <rect x="86" y="0" width="108" height="22" rx="11" fill="#0c0820" stroke="#7b2fff" stroke-width="0.8"/>
    <text x="140" y="15" font-family="'Courier New',Courier,monospace" font-size="10" fill="#a371f7" text-anchor="middle">Backend Eng</text>

    <rect x="204" y="0" width="88" height="22" rx="11" fill="#041a0f" stroke="#238636" stroke-width="0.8"/>
    <text x="248" y="15" font-family="'Courier New',Courier,monospace" font-size="10" fill="#3fb950" text-anchor="middle">Cloud / IoT</text>

    <rect x="302" y="0" width="68" height="22" rx="11" fill="#1a0e04" stroke="#d29922" stroke-width="0.8"/>
    <text x="336" y="15" font-family="'Courier New',Courier,monospace" font-size="10" fill="#e3b341" text-anchor="middle">India</text>
  </g>

  <!-- CTA row -->
  <g transform="translate(0,220)">
    <rect x="0" y="0" width="86" height="28" rx="6" fill="#161b22" stroke="#30363d" stroke-width="0.8"/>
    <text x="43" y="18.5" font-family="'Courier New',Courier,monospace" font-size="11" fill="#c9d1d9" text-anchor="middle">&#x25B6; GitHub</text>

    <rect x="96" y="0" width="86" height="28" rx="6" fill="#081628" stroke="#1f6feb" stroke-width="0.8"/>
    <text x="139" y="18.5" font-family="'Courier New',Courier,monospace" font-size="11" fill="#58a6ff" text-anchor="middle">LinkedIn</text>

    <rect x="192" y="0" width="86" height="28" rx="6" fill="#041420" stroke="#00e5ff" stroke-width="0.8"/>
    <text x="235" y="18.5" font-family="'Courier New',Courier,monospace" font-size="11" fill="#00e5ff" text-anchor="middle">Resume</text>

    <!-- Open to work -->
    <rect x="292" y="4" width="118" height="20" rx="10" fill="#041a0f" stroke="#238636" stroke-width="0.8"/>
    <circle class="d1" cx="307" cy="14" r="4" fill="#3fb950"/>
    <text x="358" y="19" font-family="'Courier New',Courier,monospace" font-size="10" fill="#3fb950" text-anchor="middle">open to work</text>
  </g>
</g>

<!-- Floating particles right side -->
<circle class="d1" cx="755" cy="48" r="2.2" fill="#00e5ff" opacity="0.55"/>
<circle class="d2" cx="770" cy="118" r="1.6" fill="#7b2fff" opacity="0.45"/>
<circle class="d3" cx="748" cy="192" r="2.5" fill="#00e5ff" opacity="0.3"/>
<circle class="d4" cx="775" cy="252" r="1.4" fill="#7b2fff" opacity="0.5"/>
<circle class="d5" cx="738" cy="155" r="1" fill="#3fb950" opacity="0.5"/>

<!-- Bottom status bar -->
<rect x="0" y="271" width="800" height="29" fill="#030a16" opacity="0.8" rx="0"/>
<line x1="0" y1="271" x2="800" y2="271" stroke="#1e3a5f" stroke-width="0.5"/>
<text x="20" y="290" font-family="'Courier New',Courier,monospace" font-size="10" fill="#3a6ea8">harish@github:~$</text>
<text x="135" y="290" font-family="'Courier New',Courier,monospace" font-size="10" fill="#8b949e">cat profile.json</text>
<text class="cursor" x="234" y="290" font-family="'Courier New',Courier,monospace" font-size="10" fill="#00e5ff">&#x2588;</text>
<text x="660" y="290" font-family="'Courier New',Courier,monospace" font-size="10" fill="#3a6ea8">IST +05:30  &#x25CF;  India</text>
</svg>
