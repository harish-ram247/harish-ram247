<!-- Language proficiency bars row 2 -->
<text x="400" y="192" font-family="'Courier New',Courier,monospace" font-size="9" fill="#3a6ea8" text-anchor="middle" letter-spacing="2">LANGUAGE PROFICIENCY</text>
