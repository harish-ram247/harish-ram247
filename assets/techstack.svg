<svg width="800" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#060c18"/>
    <stop offset="100%" stop-color="#08101f"/>
  </linearGradient>
  <linearGradient id="header-line" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#00e5ff" stop-opacity="0"/>
    <stop offset="20%" stop-color="#00e5ff" stop-opacity="0.6"/>
    <stop offset="80%" stop-color="#7b2fff" stop-opacity="0.6"/>
    <stop offset="100%" stop-color="#7b2fff" stop-opacity="0"/>
  </linearGradient>
  <filter id="glow">
    <feGaussianBlur stdDeviation="2.5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <pattern id="dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
    <circle cx="11" cy="11" r="0.6" fill="#1a2540" opacity="0.6"/>
  </pattern>
  <style>
    @keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:.9} }
    @keyframes shimmer { 0%,100%{opacity:.6} 50%{opacity:1} }
    .sh{animation:shimmer 3s ease-in-out infinite}
    .dot{animation:pulse 2.5s ease-in-out infinite}
  </style>
</defs>

<rect width="800" height="300" fill="url(#bg)" rx="14"/>
<rect width="800" height="300" fill="url(#dots)" rx="14" opacity="0.5"/>
<rect x="0.5" y="0.5" width="799" height="299" fill="none" stroke="#1e3a5f" stroke-width="1" rx="14"/>

<!-- Section header -->
<text x="400" y="30" font-family="'Courier New',Courier,monospace" font-size="10" fill="#3a6ea8" text-anchor="middle" letter-spacing="4">TECH STACK</text>
<line x1="80" y1="38" x2="720" y2="38" stroke="url(#header-line)" stroke-width="0.8"/>

<!-- Category: AI / ML  (col 1, row 1) -->
<g transform="translate(20, 55)">
  <rect x="0" y="0" width="118" height="108" rx="10" fill="#041420" stroke="#00e5ff" stroke-width="0.8" opacity="0.9"/>
  <text x="59" y="20" font-family="'Courier New',Courier,monospace" font-size="9.5" fill="#00e5ff" text-anchor="middle" letter-spacing="1">AI / ML</text>
  <line x1="10" y1="26" x2="108" y2="26" stroke="#00e5ff" stroke-width="0.4" opacity="0.4"/>
  <text x="14" y="44" font-family="'Courier New',Courier,monospace" font-size="10" fill="#8b949e">&#x25BA; GenAI</text>
  <text x="14" y="60" font-family="'Courier New',Courier,monospace" font-size="10" fill="#8b949e">&#x25BA; LangChain</text>
  <text x="14" y="76" font-family="'Courier New',Courier,monospace" font-size="10" fill="#8b949e">&#x25BA; Agentic AI</text>
  <text x="14" y="92" font-family="'Courier New',Courier,monospace" font-size="10" fill="#8b949e">&#x25BA; RAG / Agents</text>
  <text x="80" y="104" font-family="'Courier New',Courier,monospace" font-size="8" fill="#3a6ea8">active</text>
</g>

