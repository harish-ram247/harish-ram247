<svg width="800" height="210" viewBox="0 0 800 210" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#060c18"/>
    <stop offset="100%" stop-color="#08101f"/>
  </linearGradient>
  <linearGradient id="card1-border" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.8"/>
    <stop offset="100%" stop-color="#00e5ff" stop-opacity="0.1"/>
  </linearGradient>
  <linearGradient id="card2-border" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#7b2fff" stop-opacity="0.8"/>
    <stop offset="100%" stop-color="#7b2fff" stop-opacity="0.1"/>
  </linearGradient>
  <linearGradient id="card3-border" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#3fb950" stop-opacity="0.8"/>
    <stop offset="100%" stop-color="#3fb950" stop-opacity="0.1"/>
  </linearGradient>
  <linearGradient id="header-line" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#00e5ff" stop-opacity="0"/>
    <stop offset="20%" stop-color="#00e5ff" stop-opacity="0.6"/>
    <stop offset="80%" stop-color="#7b2fff" stop-opacity="0.6"/>
    <stop offset="100%" stop-color="#7b2fff" stop-opacity="0"/>
  </linearGradient>
  <filter id="glow">
    <feGaussianBlur stdDeviation="2.5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <pattern id="dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
    <circle cx="11" cy="11" r="0.6" fill="#1a2540" opacity="0.7"/>
  </pattern>
  <style>
    @keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:.9} }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
    @keyframes shimmer { 0%,100%{opacity:.5} 50%{opacity:1} }
    .icon1{animation:float 3.5s ease-in-out infinite}
    .icon2{animation:float 4s ease-in-out infinite .5s}
    .icon3{animation:float 3.8s ease-in-out infinite 1s}
    .dot{animation:pulse 2.5s ease-in-out infinite}
    .sh{animation:shimmer 3s ease-in-out infinite}
  </style>
</defs>

<rect width="800" height="210" fill="url(#bg)" rx="14"/>
<rect width="800" height="210" fill="url(#dots)" rx="14" opacity="0.5"/>
<rect x="0.5" y="0.5" width="799" height="209" fill="none" stroke="#1e3a5f" stroke-width="1" rx="14"/>

<!-- Section header -->
<text x="400" y="30" font-family="'Courier New',Courier,monospace" font-size="10" fill="#3a6ea8" text-anchor="middle" letter-spacing="4">CURRENT FOCUS</text>
<line x1="100" y1="38" x2="700" y2="38" stroke="url(#header-line)" stroke-width="0.8"/>

<!-- CARD 1: Industrial IoT -->
<g transform="translate(20, 52)">
  <rect x="0" y="0" width="238" height="142" rx="10" fill="#040e1c" opacity="0.9"/>
  <rect x="0" y="0" width="238" height="142" rx="10" fill="none" stroke="url(#card1-border)" stroke-width="1"/>
  <!-- Top accent line -->
  <line x1="10" y1="0" x2="228" y2="0" stroke="#00e5ff" stroke-width="1.5" opacity="0.6"/>

  <!-- Icon -->
  <g class="icon1" transform="translate(18, 18)">
    <!-- IoT grid icon -->
    <rect x="0" y="0" width="32" height="32" rx="6" fill="#041420" stroke="#00e5ff" stroke-width="0.8"/>
    <!-- Grid dots -->
    <circle cx="8" cy="8" r="2.5" fill="#00e5ff" opacity="0.9" filter="url(#glow)"/>
    <circle cx="16" cy="8" r="2.5" fill="#00e5ff" opacity="0.5"/>
    <circle cx="24" cy="8" r="2.5" fill="#00e5ff" opacity="0.3"/>
    <circle cx="8" cy="16" r="2.5" fill="#00e5ff" opacity="0.5"/>
    <circle cx="16" cy="16" r="2.5" fill="#00e5ff" opacity="0.9" filter="url(#glow)"/>
    <circle cx="24" cy="16" r="2.5" fill="#00e5ff" opacity="0.7"/>
    <circle cx="8" cy="24" r="2.5" fill="#00e5ff" opacity="0.3"/>
    <circle cx="16" cy="24" r="2.5" fill="#00e5ff" opacity="0.6"/>
    <circle cx="24" cy="24" r="2.5" fill="#00e5ff" opacity="0.9" filter="url(#glow)"/>
  </g>

  <text x="62" y="34" font-family="'Courier New',Courier,monospace" font-size="10" fill="#00e5ff" letter-spacing="1">ACTIVE PROJECT</text>
  <text x="18" y="68" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#e6edf3">Energy Grids &amp;</text>
  <text x="18" y="86" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#e6edf3">Industrial IoT Platform</text>
  <text x="18" y="106" font-family="'Courier New',Courier,monospace" font-size="10" fill="#8b949e">PowerSense · v2 in development</text>

  <!-- Progress -->
  <text x="18" y="126" font-family="'Courier New',Courier,monospace" font-size="9" fill="#3a6ea8">PROGRESS</text>
  <rect x="78" y="116" width="142" height="6" rx="3" fill="#0d1f35"/>
  <rect x="78" y="116" width="121" height="6" rx="3" fill="#00e5ff" opacity="0.8"/>
  <text x="228" y="124" font-family="'Courier New',Courier,monospace" font-size="9" fill="#00e5ff" text-anchor="end">85%</text>
</g>

<!-- CARD 2: Learning -->
<g transform="translate(281, 52)">
  <rect x="0" y="0" width="238" height="142" rx="10" fill="#0c0820" opacity="0.9"/>
  <rect x="0" y="0" width="238" height="142" rx="10" fill="none" stroke="url(#card2-border)" stroke-width="1"/>
  <line x1="10" y1="0" x2="228" y2="0" stroke="#7b2fff" stroke-width="1.5" opacity="0.6"/>

  <!-- Icon -->
  <g class="icon2" transform="translate(18, 18)">
    <rect x="0" y="0" width="32" height="32" rx="6" fill="#0c0820" stroke="#7b2fff" stroke-width="0.8"/>
    <!-- K8s hexagon shape -->
    <polygon points="16,4 26,9 26,22 16,28 6,22 6,9" fill="none" stroke="#7b2fff" stroke-width="1.2" opacity="0.9"/>
    <text x="16" y="20" font-family="'Courier New',Courier,monospace" font-size="9" fill="#a371f7" text-anchor="middle" font-weight="bold">k8s</text>
  </g>

  <text x="62" y="34" font-family="'Courier New',Courier,monospace" font-size="10" fill="#7b2fff" letter-spacing="1">LEARNING</text>
  <text x="18" y="68" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#e6edf3">Kubernetes</text>
  <text x="18" y="86" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#e6edf3">+ AWS Architecture</text>
  <text x="18" y="106" font-family="'Courier New',Courier,monospace" font-size="10" fill="#8b949e">CKA prep · Solutions Architect path</text>

  <!-- Tags -->
  <rect x="18" y="116" width="50" height="18" rx="9" fill="#14072e" stroke="#7b2fff" stroke-width="0.6"/>
  <text x="43" y="129" font-family="'Courier New',Courier,monospace" font-size="9" fill="#a371f7" text-anchor="middle">CKA</text>
  <rect x="76" y="116" width="56" height="18" rx="9" fill="#14072e" stroke="#7b2fff" stroke-width="0.6"/>
  <text x="104" y="129" font-family="'Courier New',Courier,monospace" font-size="9" fill="#a371f7" text-anchor="middle">AWS SAA</text>
</g>

<!-- CARD 3: Reading -->
<g transform="translate(542, 52)">
  <rect x="0" y="0" width="238" height="142" rx="10" fill="#041a0f" opacity="0.9"/>
  <rect x="0" y="0" width="238" height="142" rx="10" fill="none" stroke="url(#card3-border)" stroke-width="1"/>
  <line x1="10" y1="0" x2="228" y2="0" stroke="#3fb950" stroke-width="1.5" opacity="0.6"/>

  <!-- Icon -->
  <g class="icon3" transform="translate(18, 18)">
    <rect x="0" y="0" width="32" height="32" rx="6" fill="#041a0f" stroke="#3fb950" stroke-width="0.8"/>
    <!-- Book icon -->
    <rect x="5" y="6" width="10" height="20" rx="1" fill="none" stroke="#3fb950" stroke-width="1"/>
    <rect x="17" y="6" width="10" height="20" rx="1" fill="none" stroke="#3fb950" stroke-width="1"/>
    <line x1="16" y1="6" x2="16" y2="26" stroke="#3fb950" stroke-width="0.8"/>
    <line x1="7" y1="11" x2="13" y2="11" stroke="#3fb950" stroke-width="0.6" opacity="0.6"/>
    <line x1="7" y1="15" x2="13" y2="15" stroke="#3fb950" stroke-width="0.6" opacity="0.6"/>
    <line x1="19" y1="11" x2="25" y2="11" stroke="#3fb950" stroke-width="0.6" opacity="0.6"/>
    <line x1="19" y1="15" x2="25" y2="15" stroke="#3fb950" stroke-width="0.6" opacity="0.6"/>
  </g>

  <text x="62" y="34" font-family="'Courier New',Courier,monospace" font-size="10" fill="#3fb950" letter-spacing="1">READING</text>
  <text x="18" y="68" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#e6edf3">Designing Data-</text>
  <text x="18" y="86" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#e6edf3">Intensive Applications</text>
  <text x="18" y="106" font-family="'Courier New',Courier,monospace" font-size="10" fill="#8b949e">Martin Kleppmann · Chapter 5</text>

  <!-- Stars -->
  <text x="18" y="128" font-family="'Courier New',Courier,monospace" font-size="12" fill="#e3b341">&#x2605;&#x2605;&#x2605;&#x2605;&#x2605;</text>
  <text x="92" y="128" font-family="'Courier New',Courier,monospace" font-size="9" fill="#8b949e">must read</text>
</g>
</svg>
